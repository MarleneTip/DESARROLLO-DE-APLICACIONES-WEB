<!DOCTYPE html>
<html>
<head>
<title>Agregar Producto</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    text-align:center;
}

form{
    background:white;
    padding:30px;
    width:300px;
    margin:auto;
    border-radius:10px;
}

input{
    width:90%;
    padding:8px;
    margin:8px;
}

button{
    background:#ff69b4;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#ff1493;
}

</style>

</head>

<body>

<h1>Agregar Producto 🛍️</h1>

<form method="POST">

<input type="text" name="nombre" placeholder="Nombre del producto" required>

<input type="number" name="cantidad" placeholder="Cantidad" required>

<input type="number" step="0.01" name="precio" placeholder="Precio" required>

<br><br>

<button type="submit">Guardar producto</button>

</form>

<br>

<a href="/inventario">Volver al inventario</a>

</body>
</html>
