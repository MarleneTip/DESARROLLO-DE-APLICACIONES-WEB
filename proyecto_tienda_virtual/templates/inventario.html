<!DOCTYPE html>
<html>
<head>
    <title>Inventario - Cucharas Sorpresa</title>

<style>

body{
    font-family: Arial;
    background-color:#f4f4f4;
    text-align:center;
}

h1{
    color:#444;
}

table{
    margin:auto;
    border-collapse: collapse;
    width:70%;
    background:white;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
}

th{
    background-color:#ff69b4;
    color:white;
}

button{
    background-color:#ff69b4;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background-color:#ff1493;
}

.btn-danger{
    background-color:red;
}

.btn-danger:hover{
    background-color:darkred;
}

.top-buttons{
    margin: 20px;
}

</style>

</head>

<body>

<h1>Inventario de Cucharas Sorpresa 🥄💄</h1>

<div class="top-buttons">

    <a href="/agregar">
        <button>Agregar producto</button>
    </a>

    <a href="/reporte/pdf">
        <button style="background:#333;">Descargar PDF</button>
    </a>

</div>

<br>

<table>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Acciones</th>
</tr>

{% for producto in productos %}
<tr>
    <td>{{ producto[0] }}</td>
    <td>{{ producto[1] }}</td>
    <td>{{ producto[2] }}</td>
    <td>${{ producto[3] }}</td>

    <td>

        <a href="/editar/{{ producto[0] }}">
            <button>Editar</button>
        </a>

        <a href="/eliminar/{{ producto[0] }}">
            <button class="btn-danger">Eliminar</button>
        </a>

    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
