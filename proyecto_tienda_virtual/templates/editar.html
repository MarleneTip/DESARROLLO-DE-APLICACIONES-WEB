<!DOCTYPE html>
<html>
<head>
<title>Editar Producto</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

form{
background:white;
padding:30px;
width:300px;
margin:auto;
border-radius:10px;
}

input{
width:90%;
padding:8px;
margin:8px;
}

button{
background:#ff69b4;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Editar Producto</h1>

<form method="POST">

<input type="text" name="nombre" value="{{ producto[1] }}">

<input type="number" name="cantidad" value="{{ producto[2] }}">

<input type="number" step="0.01" name="precio" value="{{ producto[3] }}">

<br><br>

<button type="submit">Guardar cambios</button>

</form>

<br>

<a href="/inventario">Volver</a>

</body>
</html>
